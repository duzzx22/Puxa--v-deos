version: '3.8'

services:
  # Telegram Bot Principal
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: puxa-videos-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_PORT=3000
      - ADMIN_IDS=${ADMIN_IDS}
      - TIMEZONE=America/Sao_Paulo
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./temp:/app/temp
    ports:
      - "3000:3000"
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: puxa-bot-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - bot-network
    depends_on:
      - bot
    profiles:
      - with-nginx

networks:
  bot-network:
    driver: bridge

volumes:
  data:
  logs:
  temp:
